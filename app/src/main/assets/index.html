<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Focus V1</title><style>body{margin:0;background:#07131e;color:white;font-family:system-ui}.app{min-height:100vh;padding:16px;padding-bottom:85px;background:radial-gradient(circle at top,#174569,#07131e 45%,#04070c)}h1{margin:0}.sub,.meta{color:#a8c7d9;font-size:13px}.top{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#0b84ff,#50ff9d);display:grid;place-items:center}.box{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:12px;margin:12px 0}input{width:100%;box-sizing:border-box;padding:11px;margin:5px 0;border-radius:14px;border:1px solid #36566a;background:#132838;color:white;font-size:15px}.ring{margin:20px auto;width:210px;height:210px;border-radius:50%;border:14px solid rgba(255,255,255,.12);display:grid;place-items:center;box-shadow:0 0 30px rgba(11,132,255,.45)}.time{font-size:46px;font-weight:900}.mode{text-align:center;color:#a8c7d9;font-weight:900}.btn{border:0;border-radius:999px;background:#29445a;color:white;font-weight:900;padding:11px 13px;margin:3px}.green{background:#14a46d}.red{background:#d64242}.blue{background:#0b84ff}.yellow{background:#f59e0b}.bar{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:6px;overflow:auto}.hist{max-height:210px;overflow:auto}.card{background:rgba(255,255,255,.08);border-radius:16px;padding:10px;margin:8px 0}.row{display:flex;gap:8px}@media(max-width:650px){.row{display:block}.ring{width:185px;height:185px}.time{font-size:40px}}</style></head><body><div class="app"><div class="top"><div class="logo">🎯</div><div><h1>B-Focus V1</h1><div id="sum" class="sub">Focus timer</div></div></div><div class="box"><input id="task" placeholder="What are you focusing on?"><div class="row"><input id="focusMin" type="number" value="25" min="1"><input id="breakMin" type="number" value="5" min="1"></div></div><div class="ring"><div><div id="mode" class="mode">FOCUS</div><div id="time" class="time">25:00</div></div></div><div class="box"><button class="btn green" onclick="start()">Start</button><button class="btn yellow" onclick="pause()">Pause</button><button class="btn red" onclick="reset()">Reset</button><button class="btn blue" onclick="switchMode()">Switch</button><button class="btn" onclick="finishNow()">Finish Now</button></div><div class="box hist"><b>Focus History</b><div id="history"></div></div><div class="bar"><button class="btn" onclick="openLauncher()">B-Launcher</button><button class="btn" onclick="openTasks()">B-Tasks</button><button class="btn" onclick="openNotes()">B-Notes</button><button class="btn red" onclick="clearHistory()">Clear</button></div></div><script>let m='focus',run=false,timer=null,rem=25*60,sessions=0,h=[];try{h=JSON.parse(localStorage.getItem('bfocus_history')||'[]')}catch(e){}function save(){localStorage.setItem('bfocus_history',JSON.stringify(h))}function pad(n){return String(n).padStart(2,'0')}function fmin(){return Math.max(1,parseInt(focusMin.value||25))*60}function bmin(){return Math.max(1,parseInt(breakMin.value||5))*60}function draw(){time.textContent=pad(Math.floor(rem/60))+':'+pad(rem%60);mode.textContent=m=='focus'?'FOCUS':'BREAK';sum.textContent=sessions+' sessions completed'}function start(){if(run)return;run=true;timer=setInterval(()=>{rem--;if(rem<=0){finishNow();return}draw()},1000)}function pause(){run=false;if(timer)clearInterval(timer)}function reset(){pause();rem=m=='focus'?fmin():bmin();draw()}function switchMode(){pause();m=m=='focus'?'break':'focus';rem=m=='focus'?fmin():bmin();draw()}function finishNow(){pause();if(m=='focus'){sessions++;h.unshift({task:task.value.trim()||'Focus session',min:Math.round(fmin()/60),time:new Date().toLocaleString()});h=h.slice(0,50);save();m='break';rem=bmin()}else{m='focus';rem=fmin()}renderH();draw()}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function renderH(){history.innerHTML='';if(!h.length){history.innerHTML='<div class=meta>No focus sessions yet.</div>';return}h.forEach(x=>{let d=document.createElement('div');d.className='card';d.innerHTML='<b>'+esc(x.task)+'</b><div class=meta>'+x.min+' min · '+esc(x.time)+'</div>';history.appendChild(d)})}function clearHistory(){h=[];save();renderH()}function openApp(p,c,n){try{AndroidBridge.openApp(p,c,n)}catch(e){}}function openLauncher(){openApp('com.chenboda01.blauncherv1','com.chenboda01.blauncherv1.MainActivity','B-Launcher V1')}function openTasks(){openApp('com.chenboda01.btasksv1','com.chenboda01.btasksv1.MainActivity','B-Tasks V1')}function openNotes(){openApp('com.chenboda01.bnotesv1','com.chenboda01.bnotesv1.MainActivity','B-Notes V1')}window.bfocusBack=function(){pause();draw()};focusMin.onchange=()=>{if(!run&&m=='focus'){rem=fmin();draw()}};breakMin.onchange=()=>{if(!run&&m=='break'){rem=bmin();draw()}};rem=fmin();draw();renderH();</script></body></html>
